<!DOCTYPE html>
<html lang="en">

    <title>CSS Styling and Typography</title>
    <link rel="stylesheet" href="styles.css">
    <head>
    <style>
        p.normal {
            font-variant: normal;
        }

            </head>
<body>

    <p class="small">This is small-caps text.</p>

</body>
