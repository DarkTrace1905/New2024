<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Height and Spacing</title>
    <style>
        .line-height-example {
            line-height: 2; /* This sets the line height to 2 times the font size */
        }
        .letter-spacing-example {
            letter-spacing: 5px; /* This adds 5 pixels of space between each letter */
        }
         .word-spacing-example {
            word-spacing: 10px; /* This adds 10 pixels of space between each word */
        }
    </style>
</head>
<body>
    <p class="line-height-example">This is a paragraph with custom line height.</p>
    <p class="letter-spacing-example">This is a paragraph with custom letter spacing.</p>
    <p class="word-spacing-example">This is a paragraph with custom word spacing.</p>
    
</body>
</html>
