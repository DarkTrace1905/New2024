<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pseudo-Classes</title>
        <style>
            button:hover {
                background-color: rgb(5, 68, 89);
            }
            input:focus {
                border: 3px solid orange;
            }
            li:nth-child(even) { /* Selects even or odd list items and choose highlighted color scheme */
                background-color: rgb(163, 82, 225);
            }
        </style>
    </head>
    <body>
            <button>Hover me!</button>
            <input type="text" placeholder="click here" />

            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
                <li>Item 4</li>
                <li>Item 5</li>
            </ul>
    </body>
