<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Font</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        p.light {
            font-weight: 100;
            font-style: light;
        }
        p.normal {
            font-weight: 400;
            font-style: normal;
        }
        p.bold {
            font-weight: 700;
            font-style: normal;
        }
        p.italic {
            font-weight: 400;
            font-style: italic;
        }
        p.bold-italic {
            font-weight: 700;
            font-style: italic;
        }
            </style>
    
    
    <head>
    <body>
        <p class="light">This is light text.</p>
        <p class="normal">This is normal text.</p>
        <p class="bold">This is bold text.</p>
        <p class="italic">This is italic text.</p>
        <p class="bold-italic">This is bold italic text.</p> <!-- adding two classes to the same element to make it bold and italic --> 


            </body>
            </head>
</html>
