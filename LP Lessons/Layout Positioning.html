<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <head>
    <style>
        
        .block {
            display: block;
            background-color: lightblue;
            padding: 10px;
            height: 20px;
        }
        .inline {
            display: inline;
            background-color: lightcoral;
            padding: 10px;
            height: 20px;

        span {
            display: block;
            background-color: lightgreen;
            padding: 10px;
            height: 20px;
        }   
        div {
            display: inline;
            background-color: lightyellow;
            padding: 10px;
            height: 20px;
        }   
        .hidden {
            display: none;
        }      

   </style>
    </head>
    <body>
    <div class="container">Im a contianer</div>
    <div>div acting like span</div>
        <div class="block">1</div>
        <span class="inline">2</span>
        <span class="inline">3</span>
    </div>
</body>
</html>
