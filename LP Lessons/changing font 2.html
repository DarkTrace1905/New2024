<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Font</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* em - 1em is equal to the current font size or relative to parent 1em =  100% */
        /* rem - 1rem is equal to the font size of the root element (html) or relative to the root element (font size: 16px = 1rem)
         /* vw - 1vw is equal to 1% of the viewport width */
         /* vh - 1vh is equal to 1% of the viewport height */
        .small {
            font-size: 12px;
        }
        .medium {
            font-size: 16px;
        }
        .large {
            font-size: 20px;
        }
        
        .relative-size {
            font-size: 1.5em; /* 1.5 times the current font size */
        }
         
        .viewport-size {
            font-size: 5vw; /* 5% of the viewport width */
        }
         </style>    
    <head>
    <body>
        <!-- <p class="small">This is text in a small font.</p>
        <p class="medium">This is text in a medium font.</p>
        <p class="large">This is text in a large font.</p> -->
        <p class="relative-size">This text is 1.5 times the current font size.</p>
        <p class="viewport-size">This text is 5% of the viewport width.</p>
    </body>

            </head>
</html>
