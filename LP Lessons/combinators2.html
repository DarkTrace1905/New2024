<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Combinators</title>
        <style>
            .container {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .parent {
                background-color: lightblue;
                padding: 20px;
            }

            .child {
                background-color: lightcoral;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="parent">
                Parent
                <div class="child">Child</div>
            </div>
        </div>
    </body>
