<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Colors</title>
    <style>
        .red-text {
            color: red;
        }
        .blue-text {
            color: rgba(0, 0, 255, 1); /* This is an RGBA value for blue and "a" holds transparency*/
        }
        .custom-text {
            color: #b015d7; /* This is a hex code for green */
        }
</style>
</head>
<body>
<h1 class="red-text">This is red text</h1> 
<p class="blue-text">This is blue text</p>
<p class="custom-text">This is green text</p>
</body>
</html>
