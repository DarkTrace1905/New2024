<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Selectors</title>
    <style>
    *{
        color: red; 
        font-size: 28px;
        padding: 0;
        box-sizing: border-box;
    }
    
    p {
        color: blue;
    }
    </style>
</head>
<body>
    <h1>Type Selectors</h1>
    <p>Type selectors are used to select elements based on their type. For example, the selector <code>p</code> selects all paragraph elements.</p>
</body>
</html>
