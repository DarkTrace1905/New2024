<!--  declares the document as an HTML5 document -->
<!DOCTYPE html>
<html lang="en">
    <!-- head tag includes metadata and links to external resources -->
<head>
        <title>First Website</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is my first webpage created as part of learning HTML.">  
    <meta name="keywords" content="HTML, webpage, first website, learning">
    <meta name="author" content="Your Name">      
</head>
<!-- body tag contains the visible content of the webpage -->
<body>
    <h1>My First Webpage</h1>
    <p>This is a paragraph of text on my first webpage.</p>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>

</body>
</html>
